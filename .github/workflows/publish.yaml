name: Publish JAR
on:
  push:
    tags:
      # release-please tags releases without a leading "v" (e.g. 1.10.17);
      # also keep matching legacy "v"-prefixed tags.
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    uses: OneLiteFeatherNET/workflows/.github/workflows/gradle-publish.yml@v2.4.0
    # Pin the exact LTS JDK the lobby runs on: the published AOT cache is tied to
    # the precise HotSpot build, so it must be generated with the runtime's JDK
    # (Temurin 25.0.3 LTS) or the service fails with "Unable to map shared spaces".
    with:
      java-version: "25.0.3"
      java-distribution: "temurin"
    secrets: inherit
