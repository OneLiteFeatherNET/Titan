name: Publish JAR
on:
  push:
    tags:
      # release-please tags releases without a leading "v" (e.g. 1.10.17);
      # also keep matching legacy "v"-prefixed tags.
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    uses: OneLiteFeatherNET/workflows/.github/workflows/gradle-publish.yml@v2.1.0
    secrets: inherit
